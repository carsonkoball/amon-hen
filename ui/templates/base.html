<!DOCTYPE html>
<html>
	<head>
		<title>{% block title %}{% endblock %}</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
		<meta name="viewport" content="width=device-width, initial-scale=1">
	</head>

	<body>
		<header>
			<a href="{{ url_for('dashboard') }}", style="visibility: {{ back_link_visibility }};">← Dashboard</a>
			<h1>Amon Hen UI - {{ title }}</h1>
			<p>{{ description }}</p>
		</header>
		{% block content %}
		{% endblock %}
	</body>
</html>
